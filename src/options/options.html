<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R34 Visual Filter</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1>R34 Visual Filter</h1>
        <p>Локальная оболочка, раскладка и фильтры для страницы выдачи.</p>
      </div>
      <span id="status" class="status">Готово</span>
    </header>

    <section class="section">
      <h2>Основное</h2>

      <label class="checkbox-row">
        <input id="showShell" type="checkbox">
        <span>Показывать верхнюю и левую панель</span>
      </label>

      <label class="checkbox-row">
        <input id="sidebarCollapsed" type="checkbox">
        <span>Свернуть левую панель по умолчанию</span>
      </label>

      <label class="checkbox-row">
        <input id="filterEnabled" type="checkbox">
        <span>Включить фильтрацию карточек</span>
      </label>

      <label class="checkbox-row">
        <input id="previewEnabled" type="checkbox">
        <span>Включить preview видео при наведении</span>
      </label>
    </section>

    <section class="section two-columns">
      <label class="field-row">
        <span>Layout</span>
        <select id="layoutMode">
          <option value="masonry">Pinterest masonry</option>
          <option value="grid">Uniform grid</option>
        </select>
      </label>

      <label class="field-row">
        <span>Media type</span>
        <select id="mediaType">
          <option value="all">All</option>
          <option value="image">Images</option>
          <option value="video">Videos</option>
        </select>
      </label>
    </section>

    <section class="section">
      <h2>Фильтрация</h2>

      <label class="field-row">
        <span>Минимальный score</span>
        <input id="minScore" type="number" placeholder="Например: 10">
      </label>

      <label class="field-row">
        <span>Минимум просмотров</span>
        <input id="minViews" type="number" placeholder="Если доступно в DOM">
      </label>

      <label class="field-row">
        <span>Период загрузки</span>
        <select id="datePeriod">
          <option value="any">Any time</option>
          <option value="today">Today</option>
          <option value="week">This week</option>
          <option value="month">This month</option>
        </select>
      </label>

      <label class="field-row">
        <span>Selected tags</span>
        <textarea id="selectedTags" placeholder="tag_one&#10;tag_two"></textarea>
      </label>

      <label class="field-row">
        <span>Blacklist-теги</span>
        <textarea id="blacklistTags" placeholder="Один тег на строку или через запятую&#10;tag_one&#10;tag_two&#10;prefix_*"></textarea>
      </label>

      <p class="hint">
        Фильтры по дате и просмотрам работают только если нужные данные доступны в карточках или позже будут добавлены через слой metadata-fetch.
      </p>
    </section>

    <footer class="actions">
      <button id="reset" type="button" class="secondary">Сбросить</button>
    </footer>
  </main>

  <script src="../shared/settings.js"></script>
  <script src="options.js"></script>
</body>
</html>
