<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>R34 Visual Filter</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      max-width: 760px;
      background: #101014;
      color: #e6e6ee;
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .section {
      background: #181820;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin: 12px 0;
    }

    input[type="range"] {
      width: 100%;
    }

    input[type="number"],
    textarea {
      width: 100%;
      box-sizing: border-box;
      background: #20202a;
      color: #e6e6ee;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 10px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .value {
      color: #a9a9b8;
      min-width: 48px;
      text-align: right;
    }

    button {
      background: #9ecbff;
      color: #101014;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #2a2a36;
      color: #e6e6ee;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .hint {
      color: #a9a9b8;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>R34 Visual Filter</h1>

  <div class="section">
    <label>
      <input id="enabled" type="checkbox">
      Включить расширение
    </label>

    <label>
      <input id="compact" type="checkbox">
      Компактная сетка
    </label>

    <label>
      <input id="hoverUnblur" type="checkbox">
      Убирать blur при наведении
    </label>
  </div>

  <div class="section">
    <h2>Визуальные фильтры</h2>

    <label>
      <div class="row">
        <span>Brightness</span>
        <span id="brightnessValue" class="value"></span>
      </div>
      <input id="brightness" type="range" min="0.3" max="1.8" step="0.05">
    </label>

    <label>
      <div class="row">
        <span>Contrast</span>
        <span id="contrastValue" class="value"></span>
      </div>
      <input id="contrast" type="range" min="0.3" max="2" step="0.05">
    </label>

    <label>
      <div class="row">
        <span>Saturation</span>
        <span id="saturationValue" class="value"></span>
      </div>
      <input id="saturation" type="range" min="0" max="2" step="0.05">
    </label>

    <label>
      <div class="row">
        <span>Grayscale</span>
        <span id="grayscaleValue" class="value"></span>
      </div>
      <input id="grayscale" type="range" min="0" max="1" step="0.05">
    </label>

    <label>
      <div class="row">
        <span>Blur</span>
        <span id="blurValue" class="value"></span>
      </div>
      <input id="blur" type="range" min="0" max="20" step="1">
    </label>
  </div>

  <div class="section">
    <h2>Фильтрация</h2>

    <label>
      Минимальный score
      <input id="minScore" type="number" placeholder="Например: 10">
    </label>

    <label>
      Blacklist-теги
      <textarea id="blacklistTags" placeholder="Один тег на строку или через запятую&#10;пример_tag&#10;bad_tag&#10;prefix_*"></textarea>
    </label>

    <p class="hint">
      Поддерживается простой wildcard через *. Например: <code>gore_*</code>.
      Фильтр работает локально, только на твоей странице.
    </p>
  </div>

  <button id="save">Сохранить</button>
  <button id="reset" class="secondary">Сбросить</button>

  <script src="options.js"></script>
</body>
</html>
